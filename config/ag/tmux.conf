# ag tmux config — managed by ag, do not edit
# This config locks down everything that could cause title drift,
# while exposing ag tasks as window tabs in one global session.

# Basics
set -g  default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -g  history-limit 50000
set -g  mouse off
set -g  focus-events off
set -g  escape-time 0
set -g  base-index 1
setw -g pane-base-index 1
set -g  renumber-windows on

# Status bar shows tabs and their Alt shortcuts
set -g status on
set -g status-position top
set -g status-justify left
set -g status-left-length 0
set -g status-right-length 40
set -g status-left ""
set -g status-right "#[fg=colour244]Enter: edit  Esc: watch  ^q: detach  ^t: end"
set -g status-style "bg=default,fg=colour252"
set -g window-status-separator " "
set -g window-status-format ' #[fg=colour244]^#{window_index}:#{window_name} '
set -g window-status-current-format ' #[bold,fg=green]^#{window_index}:#{window_name} '

# Lock down titles — prevent shell escape sequences from renaming tabs/panes
set  -g set-titles off
setw -g allow-set-title off
setw -g allow-rename off
setw -g automatic-rename off

# Pane borders still show the task name inside each tab
set -g pane-border-status top
set -g pane-border-format ' #[bold]#{window_name} '
set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=green,bold"
set -g pane-border-lines heavy

# No prefix key; direct keybindings
set -g prefix None
unbind-key -a

# Watch mode: auto-enter copy-mode on attach and window switch
set-hook -g client-attached "copy-mode"
set-hook -g session-window-changed "copy-mode"

bind-key -n Escape copy-mode
bind-key -n C-q detach-client
bind-key -n C-t confirm-before -p "terminate all tabs? (y/n)" kill-session
# Ctrl+number tab switching (requires extended-keys for Ctrl+digit)
set -g extended-keys on
set -g extended-keys-format csi-u
bind-key -n C-1 select-window -t :=1
bind-key -n C-2 select-window -t :=2
bind-key -n C-3 select-window -t :=3
bind-key -n C-4 select-window -t :=4
bind-key -n C-5 select-window -t :=5
bind-key -n C-6 select-window -t :=6
bind-key -n C-7 select-window -t :=7
bind-key -n C-8 select-window -t :=8
bind-key -n C-9 select-window -t :=9
